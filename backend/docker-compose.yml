version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: nexus_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pwd
      POSTGRES_DB: nexus_db
    ports:
      - "5432:5432"
    volumes:
      - nexus_postgres_data:/var/lib/postgresql/data

volumes:
  nexus_postgres_data:
